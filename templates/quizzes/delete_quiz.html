<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<h1>

Удаление викторины

</h1>

<p>

Вы уверены, что хотите удалить:

<strong>

{{ quiz.title }}

</strong>

?

</p>

<form method="post">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Удалить

    </button>

    <a
        href="{% url 'my_quizzes' %}"
        class="btn btn-secondary">

        Отмена

    </a>

</form>

{% endblock %}
