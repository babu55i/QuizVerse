<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">

{{ quiz.title }}

</h1>

<p>

{{ quiz.description }}

</p>

<hr>

<form method="post">

    {% csrf_token %}

{% for question in quiz.questions.all %}

<div class="card mb-3">

    <div class="card-body">

        <h5>

            {{ question.text }}

        </h5>

        {% for answer in question.answers.all %}

        <div class="form-check">

            <input
                class="form-check-input"
                type="radio"
                name="question_{{ question.id }}"
                value="{{ answer.id }}">

            <label
                class="form-check-label">

                {{ answer.text }}

            </label>

        </div>

        {% endfor %}

    </div>

</div>

{% endfor %}

    <button
    type="submit"
    class="btn btn-success">

    Завершить викторину

</button>

</form>

{% endblock %}
