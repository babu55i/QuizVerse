{% extends "base.html" %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h1>

            Результат викторины

        </h1>

        <hr>

        <h3>

            {{ score }} из {{ total_questions }}

        </h3>

        <h4>

            {{ percentage }}%

        </h4>

        <p>

            {{ message }}

        </p>

        <div class="progress mb-3">

            <div
                class="progress-bar"
                role="progressbar"
                style="width: {{ percentage }}%;">

                {{ percentage }}%

            </div>

        </div>

        <a
            href="{% url 'quiz_detail' quiz.id %}"
            class="btn btn-primary">

            Вернуться к викторине

        </a>

    </div>

</div>

{% endblock %}
